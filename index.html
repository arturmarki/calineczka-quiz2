<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Quiz: Calineczka 🌸</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 14px;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(to bottom, #ffd6f6, #fff7fc);
    color: #333;
    text-align: center;
}

h1 {
    margin: 12px 0 18px;
    color: #d63384;
    font-size: 30px;
    line-height: 1.2;
}

.quiz-box {
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
    background: #ffffff;
    border-radius: 22px;
    padding: 22px 16px 24px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
}

#question {
    font-size: 28px;
    line-height: 1.35;
    font-weight: 700;
    color: #4a2a3a;
    margin-bottom: 20px;
    min-height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
}

#answers {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

button {
    width: 100%;
    border: none;
    border-radius: 18px;
    padding: 18px 14px;
    font-size: 22px;
    line-height: 1.3;
    font-weight: 700;
    cursor: pointer;
    background: #ff80bf;
    color: #fff;
    transition: transform 0.15s ease, opacity 0.15s ease;
    -webkit-tap-highlight-color: transparent;
}

button:hover {
    transform: scale(1.01);
}

button:active {
    transform: scale(0.99);
}

button:disabled {
    opacity: 1;
    cursor: default;
}

.correct {
    background: #4caf50 !important;
}

.wrong {
    background: #ef5350 !important;
}

.score {
    margin-top: 18px;
    font-size: 24px;
    line-height: 1.4;
    font-weight: 700;
    color: #c2185b;
    white-space: pre-line;
}

#startBtn {
    margin-top: 16px;
    background: #d63384;
}

.progress {
    margin-bottom: 14px;
    font-size: 18px;
    font-weight: 700;
    color: #b0306f;
}

@media (max-width: 480px) {
    body {
        padding: 10px;
    }

    h1 {
        font-size: 26px;
    }

    .quiz-box {
        padding: 18px 12px 20px;
        border-radius: 18px;
    }

    #question {
        font-size: 24px;
        min-height: 96px;
        margin-bottom: 16px;
    }

    button {
        font-size: 20px;
        padding: 16px 12px;
        border-radius: 16px;
    }

    .score {
        font-size: 22px;
    }

    .progress {
        font-size: 17px;
    }
}
</style>
</head>

<body>

<h1>🌸 Calineczka - Quiz 🌸</h1>

<div class="quiz-box">
    <div class="progress" id="progress">Quiz czeka na start</div>
    <div id="question">Kliknij START!</div>
    <div id="answers"></div>
    <button id="startBtn" onclick="startQuiz()">START</button>
    <div class="score" id="score"></div>
</div>

<script>
const questions = [
    {
        question: "Kto napisał Calineczkę?",
        answers: ["Andersen", "Bracia Grimm", "Julian Tuwim"],
        correct: 0
    },
    {
        question: "Z czego narodziła się Calineczka?",
        answers: ["Z kwiatu", "Z jajka", "Z liścia"],
        correct: 0
    },
    {
        question: "Kto porwał Calineczkę na początku opowieści?",
        answers: ["Żaba", "Mysz", "Kot"],
        correct: 0
    },
    {
        question: "Gdzie mieszkała Calineczka zimą?",
        answers: ["U myszy", "W lesie", "Na drzewie"],
        correct: 0
    },
    {
        question: "Kogo uratowała Calineczka?",
        answers: ["Jaskółkę", "Psa", "Kota"],
        correct: 0
    },
    {
        question: "Za kogo miała wyjść Calineczka?",
        answers: ["Za kreta", "Za żabę", "Za mysza"],
        correct: 0
    },
    {
        question: "Kto pomógł jej uciec?",
        answers: ["Jaskółka", "Motyl", "Kret"],
        correct: 0
    },
    {
        question: "Gdzie poleciała Calineczka?",
        answers: ["Do krainy kwiatów", "Do miasta", "Do lasu"],
        correct: 0
    },
    {
        question: "Kogo spotkała na końcu historii?",
        answers: ["Króla elfów", "Smoka", "Króla ludzi"],
        correct: 0
    }
];

let current = 0;
let score = 0;
let game = [];

const question = document.getElementById("question");
const answers = document.getElementById("answers");
const scoreDiv = document.getElementById("score");
const startBtn = document.getElementById("startBtn");
const progress = document.getElementById("progress");

function startQuiz() {
    startBtn.style.display = "none";
    scoreDiv.innerText = "";
    game = [...questions].sort(() => 0.5 - Math.random()).slice(0, 6);
    current = 0;
    score = 0;
    nextQuestion();
}

function nextQuestion() {
    if (current >= game.length) {
        showResult();
        return;
    }

    const q = game[current];
    progress.innerText = "Pytanie " + (current + 1) + " z " + game.length;
    question.innerText = q.question;
    answers.innerHTML = "";

    q.answers.forEach((answerText, index) => {
        const btn = document.createElement("button");
        btn.innerText = answerText;
        btn.onclick = () => checkAnswer(index, btn);
        answers.appendChild(btn);
    });
}

function checkAnswer(index, btn) {
    const correctIndex = game[current].correct;
    const allButtons = answers.querySelectorAll("button");

    allButtons.forEach(button => button.disabled = true);

    if (index === correctIndex) {
        btn.classList.add("correct");
        score++;
    } else {
        btn.classList.add("wrong");
        allButtons[correctIndex].classList.add("correct");
    }

    setTimeout(() => {
        current++;
        nextQuestion();
    }, 1000);
}

function showResult() {
    progress.innerText = "Quiz zakończony";
    question.innerText = "🎉 Koniec gry!";
    answers.innerHTML = "";

    let message = "";
    if (score === 6) {
        message = "🌟 Mistrz Calineczki!";
    } else if (score >= 4) {
        message = "😊 Bardzo dobrze!";
    } else {
        message = "🌼 Spróbuj jeszcze raz!";
    }

    scoreDiv.innerText = "Twój wynik: " + score + "/6\n" + message;

    startBtn.style.display = "block";
    startBtn.innerText = "ZAGRAJ JESZCZE RAZ";
}
</script>

</body>
</html>
